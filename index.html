<script>
// ============================================================
// 🔄 修改为使用 Cloudflare Pages Functions API
// 所有 API 调用现在都指向同一域名的 /api 路径
// ============================================================

// 用户认证状态
let currentUser = null;
const TOKEN_KEY = 'quark_user_token';
const USER_KEY = 'quark_user_info';

// DOM 元素 (延迟获取)
let modal, modalBody, authModal, authModalBody, userPanel;

// Tab切换函数
function switchTab(tabName) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    document.querySelector(`.tab-btn[onclick="switchTab('${tabName}')"]`).classList.add('active');
    document.getElementById(`tab-${tabName}`).classList.add('active');
}

// 用户认证函数
function getStoredAuth() {
    const token = localStorage.getItem(TOKEN_KEY);
    const user = localStorage.getItem(USER_KEY);
    if (token && user) {
        try {
            return { token, user: JSON.parse(user) };
        } catch {
            return null;
        }
    }
    return null;
}

function saveAuth(token, user) {
    localStorage.setItem(TOKEN_KEY, token);
    localStorage.setItem(USER_KEY, JSON.stringify(user));
}

function clearAuth() {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(USER_KEY);
    currentUser = null;
}

function updateUserPanel() {
    const auth = getStoredAuth();
    if (auth && auth.user) {
        currentUser = auth.user;
        const isVip = auth.user.isVip;
        const vipTag = isVip ? '<span style="background:gold;color:#333;padding:2px 8px;border-radius:10px;font-size:12px;margin-left:5px;">VIP</span>' : '';
        const transferInfo = isVip ? '<span class="transfer-count" style="background:gold;color:#333;">VIP无限次数</span>' : '<span class="transfer-count" id="transferCount">今日剩余: --</span>';
        
        userPanel.innerHTML = `
            <div class="user-info">
                <span class="username">${auth.user.username}</span>${vipTag}
                ${transferInfo}
                <button class="logout-btn" onclick="handleLogout()">登出</button>
            </div>
        `;
        
        if (!isVip) {
            updateTransferStatus();
        }
    } else {
        userPanel.innerHTML = `<button class="user-btn" id="userBtn" onclick="showAuthModal()">登录/注册</button>`;
    }
}

async function updateTransferStatus() {
    const auth = getStoredAuth();
    if (!auth) return;
    
    try {
        const res = await fetch('/api/auth/status', {
            headers: { 'Authorization': `Bearer ${auth.token}` }
        });
        const data = await res.json();
        if (data.success) {
            const countEl = document.getElementById('transferCount');
            if (countEl) {
                const remaining = Math.max(0, data.remaining);
                countEl.textContent = `今日剩余: ${remaining}次`;
                if (remaining === 0) {
                    countEl.style.background = '#ffe0e0';
                    countEl.style.color = '#e74c3c';
                }
            }
        }
    } catch (e) {
        console.warn('获取转存状态失败（本地测试模式）:', e.message);
    }
}

function showAuthModal() {
    const auth = getStoredAuth();
    if (auth && auth.user) {
        updateUserPanel();
        return;
    }
    
    authModalBody.innerHTML = `
        <h3 style="margin-top:0;color:#333;">用户登录</h3>
        <div style="text-align:left;margin:20px 0;">
            <label style="display:block;margin-bottom:5px;color:#666;">用户名</label>
            <input type="text" id="loginUsername" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;box-sizing:border-box;" placeholder="请输入用户名">
        </div>
        <div style="text-align:left;margin:20px 0;">
            <label style="display:block;margin-bottom:5px;color:#666;">密码</label>
            <input type="password" id="loginPassword" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;box-sizing:border-box;" placeholder="请输入密码">
        </div>
        <button onclick="handleLogin()" style="width:100%;padding:12px;background:#1e90ff;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:16px;margin-bottom:10px;">登录</button>
        <p style="color:#666;font-size:14px;">还没有账号？<a href="javascript:void(0)" onclick="showRegister()" style="color:#1e90ff;">立即注册</a></p>
    `;
    authModal.style.display = 'flex';
}

function showRegister() {
    authModalBody.innerHTML = `
        <h3 style="margin-top:0;color:#333;">用户注册</h3>
        <div style="text-align:left;margin:20px 0;">
            <label style="display:block;margin-bottom:5px;color:#666;">用户名</label>
            <input type="text" id="regUsername" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;box-sizing:border-box;" placeholder="3-20个字符">
        </div>
        <div style="text-align:left;margin:20px 0;">
            <label style="display:block;margin-bottom:5px;color:#666;">密码</label>
            <input type="password" id="regPassword" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;box-sizing:border-box;" placeholder="至少6个字符">
        </div>
        <div style="text-align:left;margin:20px 0;">
            <label style="display:block;margin-bottom:5px;color:#666;">确认密码</label>
            <input type="password" id="regConfirmPassword" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;box-sizing:border-box;" placeholder="再次输入密码">
        </div>
        <button onclick="handleRegister()" style="width:100%;padding:12px;background:#28a745;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:16px;margin-bottom:10px;">注册</button>
        <p style="color:#666;font-size:14px;">已有账号？<a href="javascript:void(0)" onclick="showAuthModal()" style="color:#1e90ff;">立即登录</a></p>
    `;
}

async function handleRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirmPassword').value;

    if (!username || !password) {
        alert('请填写完整信息');
        return;
    }

    if (password !== confirmPassword) {
        alert('两次密码输入不一致');
        return;
    }

    // 获取或生成设备ID
    let deviceId = localStorage.getItem('device_id');
    if (!deviceId) {
        deviceId = 'd_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('device_id', deviceId);
    }

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'X-Device-ID': deviceId
            },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
            alert('注册成功，请登录');
            showAuthModal();
        } else {
            alert(data.error || '注册失败');
        }
    } catch (e) {
        console.error('注册错误:', e);
        alert('网络错误（需部署到Cloudflare Pages）：' + e.message);
    }
}

async function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!username || !password) {
        alert('请填写用户名和密码');
        return;
    }

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
            saveAuth(data.token, { userId: data.userId, username: data.username, isVip: data.isVip });
            authModal.style.display = 'none';
            updateUserPanel();
        } else {
            alert(data.error || '登录失败');
        }
    } catch (e) {
        console.error('登录错误:', e);
        alert('网络错误（需部署到Cloudflare Pages）：' + e.message);
    }
}

async function handleLogout() {
    const auth = getStoredAuth();
    if (auth) {
        try {
            await fetch('/api/auth/logout', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${auth.token}` }
            });
        } catch (e) {
            console.error('登出请求失败:', e);
        }
    }
    clearAuth();
    updateUserPanel();
}

async function handleTransfer(keyword) {
    const auth = getStoredAuth();
    if (!auth) {
        alert('请先登录后再转存');
        showAuthModal();
        return;
    }

    // 获取设备ID
    let deviceId = localStorage.getItem('device_id');
    if (!deviceId) {
        deviceId = 'd_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('device_id', deviceId);
    }

    const headers = { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${auth.token}`
    };
    if (deviceId) {
        headers['X-Device-ID'] = deviceId;
    }

    try {
        const res = await fetch('/api/auth/transfer', {
            method: 'POST',
            headers: headers,
            body: JSON.stringify({ keyword })
        });
        const data = await res.json();

        if (data.success) {
            alert(`转存成功！今日还剩 ${data.remaining} 次机会`);
            updateTransferStatus();
        } else {
            alert(data.error || '转存失败');
            if (data.remaining !== undefined && data.remaining === 0) {
                updateTransferStatus();
            }
        }
    } catch (e) {
        console.error('转存错误:', e);
        alert('网络错误（需部署到Cloudflare Pages）：' + e.message);
    }
}

// 加载本地资源数据 (data.json 由 Python 脚本生成)
let localData = [];
async function loadData() {
    try {
        // Pages 环境直接使用相对路径
        const res = await fetch(`data.json?t=${Date.now()}`);
        localData = await res.json();
    } catch {
        console.error("本地数据加载失败");
        localData = [];
    }
}

// 高亮关键词
function highlight(text, keyword) {
    if(!keyword) return text;
    const reg = new RegExp(`(${keyword})`,'gi');
    return text.replace(reg,'<span class="highlight">$1</span>');
}

// 核心搜索功能
async function performSearch(keyword) {
    // === 严格的参数验证 ===
    console.group('🔍 performSearch 参数验证');
    console.log('原始参数:', keyword);
    console.log('参数类型:', typeof keyword);

    // 检查 undefined 和 null
    if (keyword === undefined) {
        console.error('❌ 错误：参数是 undefined');
        console.trace('调用堆栈：');
        console.groupEnd();
        return;
    }

    if (keyword === null) {
        console.error('❌ 错误：参数是 null');
        console.groupEnd();
        return;
    }

    // 转换为字符串并去除空格
    keyword = String(keyword).trim();
    console.log('转换后:', keyword);
    console.log('长度:', keyword.length);

    // 检查是否为空字符串
    if (keyword.length === 0) {
        console.error('❌ 错误：关键词为空字符串');
        console.groupEnd();
        alert('请输入搜索关键词');
        return;
    }

    // 检查是否只是空格
    if (!keyword.replace(/\s/g, '').length) {
        console.error('❌ 错误：关键词只包含空格');
        console.groupEnd();
        alert('请输入有效的搜索关键词');
        return;
    }

    console.log('✅ 参数验证通过');
    console.groupEnd();

    // 过滤主站域名
    const BLOCK_DOMAINS = [
        'weiyingjun.top',
        'www.weiyingjun.top',
        'https://www.weiyingjun.top',
        'https://weiyingjun.top'
    ];

    const normalizedKeyword = keyword.toLowerCase().replace(/\s/g, '');
    const isBlocked = BLOCK_DOMAINS.some(domain => 
        normalizedKeyword.includes(domain.toLowerCase().replace(/\s/g, ''))
    );

    if (isBlocked) {
        alert('暂不支持搜索主站域名');
        return;
    }

    // === 继续执行正常逻辑 ===
    // 1. 修改 URL
    const newUrl = `?q=${encodeURIComponent(keyword)}`;
    window.history.pushState({path:newUrl}, '', newUrl);
    document.title = `${keyword} - 夸克资源搜索`;

    // 2. 上报统计到 Pages API
    console.log('📊 发送统计请求...');
    try {
        const apiUrl = `/api/record?q=${encodeURIComponent(keyword)}`;
        console.log('请求URL:', apiUrl);

        const reportRes = await fetch(apiUrl);
        console.log('响应状态:', reportRes.status);

        if (reportRes.ok) {
            const reportData = await reportRes.json();
            console.log('统计成功:', reportData);

            if (reportData.count >= 10) {
                loadHotKeywords();
            }
        } else {
            const errorText = await reportRes.text();
            console.warn('统计失败:', reportRes.status, errorText);
        }
    } catch (e) {
        console.warn('统计上报失败:', e);
    }

    // 3. 在本地数据中查找资源
    if (localData.length === 0) await loadData();

    // 匹配逻辑：先检查 search_aliases，再检查 title 和 keywords
    const item = localData.find(d => {
        // 如果有 search_aliases，用别名匹配（双向匹配）
        if (d.search_aliases && d.search_aliases.length > 0) {
            return d.search_aliases.some(alias => 
                keyword.toLowerCase().includes(alias.toLowerCase()) ||
                alias.toLowerCase().includes(keyword.toLowerCase())
            );
        }
        // 没有别名时，用 title 或 keywords 匹配
        return d.title.toLowerCase().includes(keyword.toLowerCase()) ||
            (d.keywords && d.keywords.some(k => k.toLowerCase().includes(keyword.toLowerCase())));
    });

    const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
    const isLoggedIn = !!getStoredAuth();
    let html = '';

    if (item) {
        // 找到资源 - 需要登录后才能查看
        // 先检查是否还能查看（已登录用户）
        if (isLoggedIn) {
            const auth = getStoredAuth();
            try {
                const checkRes = await fetch('/api/auth/check', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${auth.token}`
                    }
                });
                const checkData = await checkRes.json();
                
                if (!checkData.allowed) {
                    // 今日次数已用完
                    alert(checkData.error || '今天已用过1次了，明天再来吧！');
                    updateTransferStatus();
                    modal.style.display = 'none';
                    return;
                }
            } catch (e) {
                console.warn('检查查看次数失败:', e);
            }
        }

        html = `<h3>✅ 找到资源：${highlight(item.title, keyword)}</h3>`;

        if (!isLoggedIn) {
            // 未登录：提示登录
            html += `<p style="color:#666;margin:15px 0;">请先登录后再查看资源</p>
                     <button onclick="showAuthModal()" class="btn" style="background:#1e90ff;">🔐 登录/注册</button>`;
        } else if (isMobile) {
            // 手机端已登录：显示跳转按钮 + 转存按钮
            html += `<p style="color:#666;margin:15px 0;">资源已准备好，请点击下方按钮访问资源</p>
                     <a href="${item.share_link}" target="_blank" class="btn">打开夸克APP保存</a>
                     <button id="transferBtn" class="btn" style="background:#28a745;margin-top:10px;">📥 转存到我的网盘</button>`;
        } else {
            // 电脑端已登录：显示二维码（需手机扫码）
            html += `<p style="color:#666;">请使用夸克或微信扫描下方二维码用手机访问资源</p>
                     <img src="${item.qrcode}" style="width:200px;height:200px;display:block;margin:10px auto;">`;
        }
    } else {
        // 未找到资源
        html = `<h3>⚠️ 暂未收录该资源</h3>
                <p>关键词：<strong>${keyword}</strong></p>
                <p>请尝试精简关键词，或扫码加入资源群求资源</p>
                <button id="requestBtn" class="btn" style="background:#ff6b35;">📮 求资源</button>
                <img src="static/wechat_qrcode.png" style="width:350px;height:350px;">`;
    }

    modalBody.innerHTML = html;
    modal.style.display = 'flex';

    // 更新用户面板的剩余次数
    if (item && isLoggedIn) {
        updateTransferStatus();
    }

    // 绑定转存按钮事件（仅当按钮存在时）
    if (item && isLoggedIn) {
        document.getElementById('transferBtn').addEventListener('click', function() {
            handleTransfer(keyword);
        });
    }

    // 未找到资源时绑定求资源按钮事件
    if (!item) {
        document.getElementById('requestBtn').addEventListener('click', async function() {
            const btn = this;
            if (btn.disabled) return;
            
            btn.disabled = true;
            btn.textContent = '提交中...';
            
            try {
                const res = await fetch('/api/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword: keyword })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('✅ ' + data.message);
                    modal.style.display = 'none';
                } else {
                    alert('❌ ' + (data.error || '提交失败'));
                }
            } catch (e) {
                alert('❌ 网络错误：' + e.message);
            }
            
            btn.disabled = false;
            btn.textContent = '📮 求资源';
        });
    }
}

function filterByType(type) {
    currentTypeFilter = type;

        btn.classList.remove('active');
        if (btn.textContent === type) btn.classList.add('active');
    });
    
    // 筛选并渲染
    const filtered = type === '全部' 
        ? allUpdatedData 
        : allUpdatedData.filter(item => (item.type || '其他') === type);
    renderUpdatedList(filtered);
}

function renderUpdatedList(data) {
    const sortedData = [...data].sort((a, b) =>

const FILTER_KEYWORDS = [
    // 在这里添加需要过滤的关键词

    '剧本'

// 加载全网热搜榜 (从 Pages API 获取)
async function loadHotKeywords(retryCount = 0) {
    const container = document.querySelector('#tab-hot #recommend');
    const maxRetries = 3;

    try {
        // 1️⃣ 等待 data.json 加载完成（最多 3 秒）
        let retry = 0;
        while (localData.length === 0 && retry < 30) {
            await new Promise(r => setTimeout(r, 100));
            retry++;
        }

        if (localData.length === 0) {
            // data.json 加载失败，尝试重新加载
            if (retryCount < maxRetries) {
                await loadData();
                return loadHotKeywords(retryCount + 1);
            }
            container.innerHTML = '';
            return;
        }

        // 2️⃣ 获取热搜榜（带超时）
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        try {
            const res = await fetch('/api/hot', { signal: controller.signal });
            clearTimeout(timeoutId);
            
            if (!res.ok) {
                throw new Error(`HTTP ${res.status}`);
            }
            
            const hotList = await res.json();
            
            // 3️⃣ 过滤热搜：次数 + 能命中资源 + 过滤指定关键词
            const validHotList = hotList.filter(item => {
                if (item.count < 10) return false;

                const word = String(item.word || '').trim();
                if (!word) return false;

                if (FILTER_KEYWORDS.includes(word)) return false;

                return localData.some(res =>
                    String(res.title || '').includes(word) ||
                    Array.isArray(res.keywords) &&
                    res.keywords.some(k => String(k).includes(word))
                );
            });

            if (!validHotList.length) {
                container.innerHTML = '';
                return;
            }

            // 4️⃣ 渲染
            let html = `<div class="recommend-card"><h3>🔥 全网实时热搜</h3>`;

            validHotList.forEach(item => {
                const isFire = item.count >= 10 ? 'hot-fire' : '';
                const fireIcon = item.count >= 10 ? '🔥' : '';
                const safeWord = item.word.replace(/'/g, "\\'");

                html += `<span class="hot-keyword ${isFire}"
                    onclick="document.getElementById('searchInput').value='${safeWord}';
                             document.getElementById('searchBtn').click();">
                    ${fireIcon}${item.word}
                </span>`;
            });

            html += '</div>';
            container.innerHTML = html;

        } catch (fetchError) {
            clearTimeout(timeoutId);
            console.warn('热搜请求失败:', fetchError);
            
            // 重试机制
            if (retryCount < maxRetries) {
                await new Promise(r => setTimeout(r, 1000));
                return loadHotKeywords(retryCount + 1);
            }
            container.innerHTML = '';
        }

    } catch (err) {
        console.error('热搜加载失败:', err);
        container.innerHTML = '';
    }
}

// 获取今天日期（使用本地时间）
function getTodayDate() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

// 加载今日更新
async function loadTodayUpdate() {
    try {
        const res = await fetch('update.json?t=' + Date.now());
        const data = await res.json();
        
        const today = getTodayDate();
        const todayData = data.filter(item => item.date === today);
        
        if (todayData.length === 0) {
            // 如果今天没有，取最近3天的
            const recentData = data.slice(0, 10);
            renderTodayUpdate(recentData, true);
        } else {
            renderTodayUpdate(todayData.slice(0, 10), false);
        }
    } catch (e) {
        console.error('加载今日更新失败:', e);
        document.getElementById('todayUpdate').innerHTML = '加载失败';
    }
}
