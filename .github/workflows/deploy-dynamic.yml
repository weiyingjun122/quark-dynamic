name: Auto Build & Deploy (Dynamic)

on:
  push:
    branches:
      - main
    paths:
      - 'resources.xlsx'
      - 'update.xlsx'
      - 'scripts/**'
      - 'index.html'
      - 'worker-test.html'
  workflow_dispatch:
    inputs:
      description:
        description: '手动运行的描述'
        required: false
        default: '手动运行部署'

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout 代码
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ 设置 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas qrcode pillow openpyxl requests jq

      # 4️⃣ 构建资源 data.json & qrcode
      - name: Build Resources
        run: |
          cd scripts
          python build_resources.py
          cd ..

      # 5️⃣ 构建已更新资源 update.json
      - name: Build Update List
        run: |
          cd scripts
          python build_update.py
          cd ..

      # 6️⃣ 生成 SEO 页面
      - name: Generate SEO Pages
        run: |
          echo "开始生成 SEO 页面..."
          ROOT_DIR=$(pwd)
          mkdir -p "$ROOT_DIR/search"
          cd scripts
          python gen_seo_from_stats.py
          cd ..
          echo "SEO 页面生成完成"

      # 7️⃣ 提交更新
      - name: Commit & Push changes
        env:
            GH_PAT: ${{ secrets.GH_PAT }}
        run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            git add data.json 2>/dev/null || true
            git add update.json 2>/dev/null || true
            git add static/status.json 2>/dev/null || true
            git add static/qrcode/* 2>/dev/null || true
            git add search/ 2>/dev/null || true

            if ! git diff --cached --quiet; then
                echo "有变更，提交并推送..."
                git commit -m "自动生成: SEO页面和资源文件 - $(date '+%Y-%m-%d %H:%M:%S')"
                git push
            else
                echo "没有变更"
            fi

      # 8️⃣ 部署到 Cloudflare Pages (quark-dynamic)
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: 'quark-dynamic'
          directory: '.'
